<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Title -->
    <title>Essential RPG</title>

    <!-- Primary SEO -->
    <meta name="title" content="Essential RPG" />
    <meta
      name="description"
      content="Essential RPG is a Roblox game development organization creating immersive, high-quality RPG experiences with polished gameplay, creative worlds, and engaging adventures for players."
    />
    <meta
      name="keywords"
      content="Essential RPG, Cursed Blade Roblox"
    />
    <meta name="author" content="Slyckster" />

    <!-- Open Graph (Facebook, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://slycksters.github.io/essential-rpg/" />
    <meta property="og:title" content="Essential RPG" />
    <meta
      property="og:description"
      content="Essential RPG is a Roblox game development organization creating immersive, high-quality RPG experiences with polished gameplay, creative worlds, and engaging adventures for players."
    />
    <meta property="og:image" content="./favicon.png" />

    <!-- Twitter Card (forces side image layout) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Essential RPG" />
    <meta
      name="twitter:description"
      content="Essential RPG is a Roblox game development organization creating immersive, high-quality RPG experiences with polished gameplay, creative worlds, and engaging adventures for players."
    />
    <meta
      name="twitter:image"
      content="./favicon.png"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://slycksters.github.io/essential-rpg/" />

    <!-- Theme color (mobile browser UI) -->
    <meta name="theme-color" content="#0b0908" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0b0908" />

    <!-- SEO Control -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://slycksters.github.io/essential-rpg/" />

    <!-- Structured Data (Organization) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Essential RPG",
        "url": "https://slycksters.github.io/essential-rpg/",
        "logo": "./favicon.png",
        "description": "Essential RPG is a Roblox game development organization creating immersive, high-quality RPG experiences with polished gameplay, creative worlds, and engaging adventures for players.",
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
